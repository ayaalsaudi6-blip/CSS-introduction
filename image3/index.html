<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Task 3 - Links and Lists</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 class="main-title">Have Fun while Styling !</h2>
    <hr> <p class="intro-text">Here is a text <a href="#" class="orange-link">with a link</a>. Let's do it !</p>
    
    <p>We have more <a href="#" class="orange-link">links</a> here ;</p>
    
    <p>Is this a (<a href="#" class="highlight-link">link</a> ?).</p>

    <ul>
        <li><strong>Please, <a href="#" class="red-link">Click Me!</a></strong></li>
        <li>Can you ? let's count
            <ul class="sub-list">
                <li class="blue-text">111</li>
                <li>222 <a href="#" class="red-link">Another Link</a></li>
                <li class="blue-text">333
                    <div class="colors-group">
                        <span class="c-red">red</span><br>
                        <span class="c-green">green</span><br>
                        <span class="c-blue">blue</span> <a href="#" class="red-link">Colors Link</a>
                    </div>

            </ul>
        </li>
        <li>That's Enough !</li>
    </ul>
